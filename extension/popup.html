<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>TermLearner</title>
</head>
<body>
  <div class="header">
    <h1>TermLearner</h1>
    <div class="header-actions">
      <button class="icon-btn" id="scanBtn" title="Scan current page">&#x1F50D;</button>
      <button class="icon-btn" id="refreshBtn" title="Refresh">&#x21bb;</button>
      <button class="icon-btn" id="settingsBtn" title="Settings">&#x2699;</button>
    </div>
  </div>

  <div id="statusBar" class="status-bar"></div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="new">
      New <span class="term-count" id="newCount">0</span>
    </button>
    <button class="tab-btn" data-tab="known">
      Known <span class="term-count" id="knownCount">0</span>
    </button>
  </div>

  <div class="content" id="termList"></div>

  <script src="popup.js"></script>
</body>
</html>
